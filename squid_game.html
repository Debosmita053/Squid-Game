<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="icon" type="image/png" href="assests/Mask Group (1).png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-black">
    <nav class="flex items-center justify-around p-4 w-auto h-auto mt-6">
        <div>
            <img class="h-10 w-auto" src="assests/Group 355.png" alt="logo">
        </div>
        <div>
            <img  src="assests/[CITYPNG 1.png" alt="squid_game">
        </div>
        <div>
            <img src="assests/Group 1.png" alt="group">
        </div>
    </nav>


    <main class="flex items-center justify-around basis-1/3 p-4 w-auto h-screen ">
       
    <div class="flex flex-col items-center space-y-6">
        <div class="flex items-center justify-center p-8">
            <div class="relative">
                
                <div class="border-[10px] border-[#FF0090] rounded-full flex items-center justify-center p-8">
                <div class=" rounded-full ">
                    <img 
                    src="assests/Mask Group (1).png" 
                    alt="Squid Game Doll" 
                    >
                </div>
                </div>
            </div>
        </div>
        <h1 class="bg-gradient-to-r from-pink-500 to-gray-50 bg-clip-text text-transparent text-6xl font-medium">Squid Games</h1>
            <div class="flex justify-center items-center space-x-4 max-w-3xl w-100">
                <div class="flex flex-col items-center space-y-4">
                    <img class="w-20 h-10" src="assests/Polygon 6.png" alt="">
                    <img class="w-20 h-10" src="assests/Rectangle 8.png" alt="">
                </div>
                <div>
                    <p class="text-white text-lg leading-relaxed">Once you start the game, there is no turning back, The winner is alone, the loser only faces death</p>
                </div>
            </div>
        <div class="flex items-center justify-center p-8">
            <div class="relative">
                
                <div class="border-[10px] border-gray-200 flex items-center justify-center p-8 bg-black">
                <div class=" rounded-full ">
                    <img 
                    src="assests/Mask Group (2).png" 
                    alt="Squid Game Doll" 
                    >
                </div>
                </div>
            </div>
        </div>
    </div>
        <div>
             
            <img src="assests/Squid-Game-Costume-PNG-HQ-Photo 1.png" alt="">
        </div>
        <div class="min-h-screen bg-black flex items-center justify-center p-8 font-sans">
  <div class="relative w-full max-w-[520px]">
    
    <div class="border-8 border-[#FF0090] rounded-xl overflow-hidden bg-black relative">
      
      <div class="relative h-[320px] bg-gradient-to-b from-black to-red-950 flex items-center justify-center">
        
        <div class="relative w-full h-full flex items-end justify-center">
          <img 
            src="assests/image 1.png"
            alt="Squid Game Guards" 
            class="w-full h-full object-cover "
          >
        </div>
      </div>

      
      <div class="bg-black py-6 flex justify-center p-10">
        <button onclick="alert('Game Started!')" 
                class="group flex items-center bg-[#FF0090] hover:bg-[#FF1A9F] transition-all duration-200 rounded-xl overflow-hidden ">
          
          <div class="px-10 py-4 text-white font-bold text-2xl tracking-wider">
            Start New Game
          </div>
          
        </button>
      </div>
    </div>

    
    <div class="mt-8">
      <div class="relative flex justify-center">
        
        <svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-2xl">
          <path d="M100 20 L190 160 L10 160 Z" stroke="#ffffff" stroke-width="10" fill="transparent"/>
        </svg>
        
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 overflow-hidden ">
          <img class="width-40 h-40"
            src="assests/Mask Group.png" 
            alt="Player" 
            class="w-full h-full object-cover"
          >
        </div>
      </div>
    </div>
  </div>
</div>

</main>

    <footer class="flex items-center justify-around p-4 w-auto h-auto text-white p-10">
        <div class="flex gap-10 text-xl">
            <a href="#">About</a>
            <a href="#">Trailer</a>
            <a href="#">Games</a>
            <a href="#">Actors</a>
        </div>
        <div class="flex items-center gap-10 text-3xl">
            <span>Start New Game</span><img src="assests/Polygon 2.png" alt=""></>
        </div>
        <div class="flex gap-4 items-center text-xl">
            <a href="#">Season</a>
            <a href="#">2021</a>
            <span></span><img class="w-5 h-5" src="assests/Vector.png" alt="">
            <a class="text-yellow-400 " href="#">9.8</a>
        </div>
    </footer>
</body>

</html>
